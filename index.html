<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12 Surat Spesial Buat Syavira Dwi Dinanti ✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Quicksand:wght@500;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #0b0c10; /* Latar Belakang Hitam */
            font-family: 'Quicksand', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(#1f2833 1px, transparent 1px);
            background-size: 20px 20px;
            box-sizing: border-box;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        /* EFEK HATI JATUH */
        .heart-particle {
            position: fixed;
            top: -10px;
            color: #ff7597;
            font-size: 20px;
            pointer-events: none;
            z-index: 999;
            animation: fall linear forwards;
        }
        @keyframes fall {
            to {
                transform: translateY(105vh) rotate(360deg);
                opacity: 0;
            }
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        /* 1. KOTAK PESAN PEMBUKA */
        .message-box {
            background-color: rgba(31, 40, 51, 0.9);
            border: 4px solid #ff7597; /* Pink */
            border-radius: 20px;
            padding: 30px;
            max-width: 450px;
            box-shadow: 0 8px 20px rgba(255, 117, 151, 0.3);
            transition: all 0.5s ease;
        }

        .message-text {
            color: #66fcf1; /* Biru Pastel */
            font-size: 22px;
            font-family: 'Fredoka', sans-serif;
            margin-bottom: 25px;
            line-height: 1.5;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-next {
            background-color: #ff7597;
            color: #0b0c10;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Fredoka', sans-serif;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 4px 10px rgba(255, 117, 151, 0.4);
        }

        .btn-next:hover {
            transform: scale(1.05);
            background-color: #ff4a75;
        }

        /* 2. MENU UTAMA GALERI SURAT */
        .gallery-wrapper {
            display: none;
            width: 100%;
            animation: fadeIn 1s ease forwards;
        }

        .gallery-title {
            color: #ff7597;
            font-family: 'Fredoka', sans-serif;
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255,117,151,0.5);
        }

        .gallery-subtitle {
            color: #66fcf1;
            font-size: 16px;
            margin-bottom: 40px;
        }

        .envelope-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 50px;
            justify-items: center;
            padding: 20px;
        }

        /* 3. KOMPONEN AMPLOP KECIL */
        .envelope-card {
            position: relative;
            width: 200px;
            height: 130px;
            background-color: #45a29e; /* Biru Amplop */
            border-radius: 0 0 8px 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            cursor: pointer;
            transition: transform 0.3s, background-color 0.3s;
        }

        /* Gaya untuk amplop yang masih terkunci */
        .envelope-card.locked {
            background-color: #2c3e50 !important;
            cursor: not-allowed;
            opacity: 0.6;
        }
        .envelope-card.locked::before {
            border-top-color: #34495e !important;
        }
        .envelope-card.locked::after {
            border-left-color: #1a252f !important;
            border-right-color: #1a252f !important;
            border-bottom-color: #1a252f !important;
        }
        .envelope-card.locked .envelope-label {
            background-color: #7f8c8d !important;
            color: #bdc3c7;
        }

        .envelope-card:not(.locked):hover {
            transform: translateY(-10px) scale(1.03);
        }

        /* Segitiga Penutup Amplop */
        .envelope-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 100px solid transparent;
            border-right: 100px solid transparent;
            border-top: 70px solid #52b2ae;
            z-index: 4;
            transition: transform 0.3s, border-top-color 0.3s;
            transform-origin: top;
        }

        /* Efek tutup membuka saat di-hover */
        .envelope-card:not(.locked):hover::before {
            transform: rotateX(180deg) translateY(0px);
            z-index: 1;
        }

        /* Lipatan Dalam Amplop */
        .envelope-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 100px solid #398c89;
            border-right: 100px solid #398c89;
            border-top: 65px solid transparent;
            border-bottom: 65px solid #398c89;
            border-radius: 0 0 8px 8px;
            z-index: 3;
            transition: border-color 0.3s;
        }

        /* Label Angka Surat */
        .envelope-label {
            position: absolute;
            top: 45px;
            left: 80px;
            width: 40px;
            height: 40px;
            background-color: #ff7597;
            border-radius: 50%;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0b0c10;
            font-family: 'Fredoka', sans-serif;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            transition: background-color 0.3s;
        }

        /* 4. POPUP OVERLAY */
        .popup-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(11, 12, 16, 0.9);
            z-index: 100;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .popup-letter {
            background-color: #fff0f5;
            border: 5px solid #ff7597;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            padding: 40px;
            box-sizing: border-box;
            position: relative;
            transform: scale(0.7);
            transition: transform 0.4s ease;
            box-shadow: 0 10px 30px rgba(255,117,151,0.3);
            text-align: center;
        }

        .popup-text {
            font-size: 18px;
            color: #0b0c10;
            line-height: 1.6;
            font-weight: 600;
            white-space: pre-line;
        }

        .btn-close {
            margin-top: 30px;
            background-color: #0b0c10;
            color: #ff7597;
            border: 2px solid #ff7597;
            padding: 10px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Fredoka', sans-serif;
            font-weight: bold;
            transition: all 0.2s;
        }

        .btn-close:hover {
            background-color: #ff7597;
            color: #0b0c10;
        }

        .popup-overlay.show {
            display: flex;
            opacity: 1;
        }
        .popup-overlay.show .popup-letter {
            transform: scale(1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <audio id="backsound" loop src="Glenn Fredly - Nyali Terakhir.mp3"></audio>

    <div class="container">
        <div class="message-box" id="msgBox">
            <div class="message-text" id="textGanti">Halo Queen Ozaikuh ...<br><br>Yuk dimulai! klik Next ya bee 💙🌸<br>Pastikan sudah tidak sibuk ya sayang.</div>
            <button class="btn-next" onclick="nextPesan()" id="btnNext">Next ➡️</button>
        </div>

        <div class="gallery-wrapper" id="galleryBox">
            <h1 class="gallery-title">Surat-Surat Untukmu Bee 💙🌸</h1>
            <p class="gallery-subtitle">Pilih dan buka suratnya satu per satu secara berurutan ya Bee!</p>
            
            <div class="envelope-grid">
                <div class="envelope-card" id="env-1" onclick="bukaSurat(1)"><div class="envelope-label">1</div></div>
                <div class="envelope-card locked" id="env-2" onclick="bukaSurat(2)"><div class="envelope-label">2</div></div>
                <div class="envelope-card locked" id="env-3" onclick="bukaSurat(3)"><div class="envelope-label">3</div></div>
                <div class="envelope-card locked" id="env-4" onclick="bukaSurat(4)"><div class="envelope-label">4</div></div>
                <div class="envelope-card locked" id="env-5" onclick="bukaSurat(5)"><div class="envelope-label">5</div></div>
                <div class="envelope-card locked" id="env-6" onclick="bukaSurat(6)"><div class="envelope-label">6</div></div>
                <div class="envelope-card locked" id="env-7" onclick="bukaSurat(7)"><div class="envelope-label">7</div></div>
                <div class="envelope-card locked" id="env-8" onclick="bukaSurat(8)"><div class="envelope-label">8</div></div>
                <div class="envelope-card locked" id="env-9" onclick="bukaSurat(9)"><div class="envelope-label">9</div></div>
                <div class="envelope-card locked" id="env-10" onclick="bukaSurat(10)"><div class="envelope-label">10</div></div>
                <div class="envelope-card locked" id="env-11" onclick="bukaSurat(11)"><div class="envelope-label">11</div></div>
                <div class="envelope-card locked" id="env-12" onclick="bukaSurat(12)"><div class="envelope-label">12</div></div>
            </div>
        </div>
    </div>

    <div class="popup-overlay" id="popupOverlay">
        <div class="popup-letter">
            <div class="popup-text" id="isiSuratDetail">Isi surat akan muncul di sini...</div>
            <button class="btn-close" onclick="tutupSurat()">Tutup Surat 💌</button>
        </div>
    </div>

    <script>
        // Teks Pesan Pembuka
        const daftarPesan = [
            "Hai Bee...✨<br>Akhirnya dibuka juga link-nya 💙",
            "Hari ini dan seterusnya akan berbeda ya sayang.<br>Aku gak cuma nulis surat lagi...",
            "Aku sengaja bikin halaman web ini khusus buat kamu Syavira Dwi Dinanti.",
            "Aku udah siapin 12 surat spesial yang bisa kamu baca...💙",
            "Kamu bisa kasih jeda-jeda ya!\nKalau suka kamu bisa Screenshot hehe..",
            "Aku buat sesuai nomer urutan, jadi buka secara perlahan saja ya Bee..💙",
            "Aku berharap kamu suka ya sayangkuh ...",
            "Silakan klik dibawah buat masuk ke surat specialnya ya Bee! 👇💙"
        ];

        // 12 Isi Surat
        const daftarSurat = {
            1: "Surat 1: Halo Sayang!\n\nIni surat pertama buat kamu. Cuma mau bilang makasih ya udah nemenin aku sampai hari ini.Aku akan selalu kasih yang terbaik sebisa mungkin sayangkuh.\nI love you! 💙\n\n-pin",
            2: "Surat 2: Semangat Ya!\n\nKalau kamu lagi capek atau pusing sama urusan kamu apa lagi sama member kamu, inget ya ada aku di sini yang selalu dukung kamu.\nKamu pasti bisa! dan aku tau kamu pasti bisa sayangku 🌸\n\n-pin",
            3: "Surat 3: Kangen Deh... Pengen cepet ketemu kamu!\n\nSelalu berharap cepet cepet mau liburan aja kalau lagi ga seshift kayak gini.\nFokus ya kerjanya bee.\nLOVE YOU SO FUCKING BADLY BEE ! 🖤\n\n-pin",
            4: "Surat 4: Makasih Ya!\n\nMakasih udah selalu sabar kalau aku lagi rewel atau banyak maunya apalagi kalau lagi Overthingking.\nSabar terus ya sama aku, hehe..\nAku begini karena susah banget jauh dari kamu sayangku.\n\n-pin",
            5: "Surat 5: Ingat Hal Ini?\n\nAku masih inget banget pas pertama kali kita sedekat ini, di pantai itu loh...\nGak nyangka ya sekarang kita bisa sedeket ini, terus disisiku ya sayang, aku mau kamu dan selamanya itu kamu.\n\n-pin",
            6: "Surat 6: Jaga Kesehatan!\n\nJangan suka tidur kelamaan dan jangan telat makan ya + Vitamin C diminum ya!\nAku gak mau kamu drop atau sakit.\nHarus nurut! Oh ya, Jangan lupa minum air ya bee. 🖤\nOhya, BAK dan BAB nya dipakai habis ya, hari ini aku ga pakai karena fokus buatin kamu ini... hehe\n\n-pin",
            7: "Surat 7: Paling Spesial\n\nKamu tahu gak? Di mataku, kamu itu orang paling hebat dan paling manis yang pernah aku temuin. Jadi selalu percaya diri ya sayangku. Paling dimataku kamu itu cuma dua, yaitu cantik sama cantik pake banget Bee...\n\n-pin",
            8: "Surat 8: Maaf Ya...\n\nMaaf ya kalau kadang aku bikin kamu kesel atau bad mood. Aku bakal berusaha jadi yang lebih baik lagi buat kamu..\n\n-pin",
            9: "Surat 9: Harapan Aku\n\nSemoga kita bisa terus bareng-bareng ya, melewati banyak hal seru maupun susah ke depannya. Tetap genggam tangan aku bee ILYSM !! 💙\n\n-pin",
            10: "Surat 10: Dear Mybee..✨\n\nIni surat kesepuluh di web ini, tapi sayang aku ke kamu gak akan ada akhirnya.\nStay Fokus kesayanganku, pacar terindahku,belahan jiwaku, manusia terfavorit aku! 🖤🌸💙\n\n-pin",
            11: "Surat 11: Hola kecayangan acuh!!\n\nOverthingking itu cuma buat orang yang lagi ga percaya diri.\nMaaf ya aku selalu buat kamu repot karena aku selalu ga percaya diri bee kalau jauh dari kamu.\nBut LOVE YOU SO MUCH!!!\n\n-pin",
            12: "Surat 12: Terakhir Banget ✨\n\nFokus kerjanya, jangan sampai lengah ya sayang, Walaupun lagi sepi harus fokus.\nBtw aku suka banget selalu dikabarin lewat video saat aku sedang tidak percaya diri.\n\n-pin"
        };

        let indeksPesan = 0;
        let suratTerbukaMaksimal = 1; // Menyimpan progres surat yang sudah berurutan dibuka
        let currentActiveSurat = null;

        // Fungsi Memutar Musik Latar Belakang & Membuat Hati Jatuh
        function startEffects() {
            const music = document.getElementById("backsound");
            if (music.paused) {
                music.play().catch(e => console.log("Autoplay dicegah browser, musik jalan saat interaksi berikutnya."));
            }
            // Trigger efek hati jatuh berkala
            setInterval(createHeart, 1500);
        }

        function createHeart() {
            const heart = document.createElement("div");
            heart.classList.add("heart-particle");
            heart.innerHTML = ["❤️", "💖", "🌸", "✨", "💙"][Math.floor(Math.random() * 5)];
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.animationDuration = Math.random() * 3 + 2 + "s";
            heart.style.fontSize = Math.random() * 15 + 15 + "px";
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 5000);
        }
        
        function nextPesan() {
            const textElement = document.getElementById("textGanti");
            startEffects(); // Jalankan musik/hati begitu tombol Next di klik pertama kali
            
            if (indeksPesan < daftarPesan.length) {
                textElement.style.opacity = 0;
                setTimeout(() => {
                    textElement.innerHTML = daftarPesan[indeksPesan];
                    textElement.style.opacity = 1;
                    indeksPesan++;
                }, 300);
            } else {
                document.getElementById("msgBox").style.display = "none";
                document.getElementById("galleryBox").style.display = "block";
            }
        }

        function bukaSurat(nomor) {
            // Jika surat nomor tersebut masih terkunci, jangan biarkan dibuka
            if (nomor > suratTerbukaMaksimal) {
                alert("Eitss! Bukanya harus berurutan ya sayang... Buka surat nomor " + suratTerbukaMaksimal + " dulu 💙");
                return;
            }

            currentActiveSurat = nomor;
            const overlay = document.getElementById("popupOverlay");
            const isiSurat = document.getElementById("isiSuratDetail");
            
            isiSurat.innerText = daftarSurat[nomor];
            
            overlay.style.display = "flex";
            setTimeout(() => {
                overlay.classList.add("show");
            }, 10);
        }

        function tutupSurat() {
            const overlay = document.getElementById("popupOverlay");
            overlay.classList.remove("show");
            setTimeout(() => {
                overlay.style.display = "none";
                
                // Jika dia menutup surat yang sedang aktif dikerjakan, buka kunci surat berikutnya
                if (currentActiveSurat === suratTerbukaMaksimal && suratTerbukaMaksimal < 12) {
                    suratTerbukaMaksimal++;
                    const nextEnvelope = document.getElementById("env-" + suratTerbukaMaksimal);
                    if (nextEnvelope) {
                        nextEnvelope.classList.remove("locked");
                    }
                }
            }, 400);
        }
    </script>
</body>
</html>
