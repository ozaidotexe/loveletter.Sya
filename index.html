<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Quicksand:wght@500;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #0b0c10; /* Latar Belakang Hitam */
            font-family: 'Quicksand', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(#1f2833 1px, transparent 1px);
            background-size: 20px 20px;
            box-sizing: border-box;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        /* EFEK HATI JATUH */
        .heart-particle {
            position: fixed;
            top: -10px;
            color: #ff7597;
            font-size: 20px;
            pointer-events: none;
            z-index: 999;
            animation: fall linear forwards;
        }
        @keyframes fall {
            to {
                transform: translateY(105vh) rotate(360deg);
                opacity: 0;
            }
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        /* 1. KOTAK PESAN PEMBUKA */
        .message-box {
            background-color: rgba(31, 40, 51, 0.9);
            border: 4px solid #ff7597; /* Pink */
            border-radius: 20px;
            padding: 30px;
            max-width: 450px;
            box-shadow: 0 8px 20px rgba(255, 117, 151, 0.3);
            transition: all 0.5s ease;
        }

        .message-text {
            color: #66fcf1; /* Biru Pastel */
            font-size: 22px;
            font-family: 'Fredoka', sans-serif;
            margin-bottom: 25px;
            line-height: 1.5;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.3s ease; /* Transisi text pudar mulus */
            opacity: 1;
        }

        .btn-next {
            background-color: #ff7597;
            color: #0b0c10;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Fredoka', sans-serif;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 4px 10px rgba(255, 117, 151, 0.4);
        }

        .btn-next:hover {
            transform: scale(1.05);
            background-color: #ff4a75;
        }

        /* 2. MENU UTAMA GALERI SURAT */
        .gallery-wrapper {
            display: none;
            width: 100%;
            animation: fadeIn 1s ease forwards;
        }

        .gallery-title {
            color: #ff7597;
            font-family: 'Fredoka', sans-serif;
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255,117,151,0.5);
        }

        .gallery-subtitle {
            color: #66fcf1;
            font-size: 16px;
            margin-bottom: 40px;
        }

        .envelope-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 50px;
            justify-items: center;
            padding: 20px;
        }

        /* 3. KOMPONEN AMPLOP KECIL */
        .envelope-card {
            position: relative;
            width: 200px;
            height: 130px;
            background-color: #45a29e; /* Biru Amplop */
            border-radius: 0 0 8px 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            cursor: pointer;
            transition: transform 0.3s, background-color 0.3s;
        }

        /* Gaya untuk amplop yang masih terkunci */
        .envelope-card.locked {
            background-color: #2c3e50 !important;
            cursor: not-allowed;
            opacity: 0.6;
        }
        .envelope-card.locked::before {
            border-top-color: #34495e !important;
        }
        .envelope-card.locked::after {
            border-left-color: #1a252f !important;
            border-right-color: #1a252f !important;
            border-bottom-color: #1a252f !important;
        }
        .envelope-card.locked .envelope-label {
            background-color: #7f8c8d !important;
            color: #bdc3c7;
        }

        .envelope-card:not(.locked):hover {
            transform: translateY(-10px) scale(1.03);
        }

        /* Segitiga Penutup Amplop */
        .envelope-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 100px solid transparent;
            border-right: 100px solid transparent;
            border-top: 70px solid #52b2ae;
            z-index: 4;
            transition: transform 0.3s, border-top-color 0.3s;
            transform-origin: top;
        }

        /* Efek tutup membuka saat di-hover */
        .envelope-card:not(.locked):hover::before {
            transform: rotateX(180deg) translateY(0px);
            z-index: 1;
        }

        /* Lipatan Dalam Amplop */
        .envelope-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 100px solid #398c89;
            border-right: 100px solid #398c89;
            border-top: 65px solid transparent;
            border-bottom: 65px solid #398c89;
            border-radius: 0 0 8px 8px;
            z-index: 3;
            transition: border-color 0.3s;
        }

        /* Label Angka Surat */
        .envelope-label {
            position: absolute;
            top: 45px;
            left: 80px;
            width: 40px;
            height: 40px;
            background-color: #ff7597;
            border-radius: 50%;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0b0c10;
            font-family: 'Fredoka', sans-serif;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            transition: background-color 0.3s;
        }

        /* 4. POPUP OVERLAY */
        .popup-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(11, 12, 16, 0.9);
            z-index: 100;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .popup-letter {
            background-color: #fff0f5;
            border: 5px solid #ff7597;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            padding: 30px 30px 40px 30px;
            box-sizing: border-box;
            position: relative;
            transform: scale(0.7);
            transition: transform 0.4s ease;
            box-shadow: 0 10px 30px rgba(255,117,151,0.3);
            text-align: center;
        }

        .popup-text {
            font-size: 18px;
            color: #0b0c10;
            line-height: 1.6;
            font-weight: 600;
            white-space: pre-line;
        }

        /* Gaya Khusus untuk Tanggal yang Muncul di Tengah Bawah Gambar */
        .popup-date {
            display: none; /* Sembunyi secara default di halaman web */
            font-size: 13px;
            color: #7f8c8d;
            margin-top: 25px;
            font-weight: bold;
            font-family: 'Quicksand', sans-serif;
            letter-spacing: 1px;
        }

        .btn-close {
            margin-top: 15px;
            background-color: #0b0c10;
            color: #ff7597;
            border: 2px solid #ff7597;
            padding: 10px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Fredoka', sans-serif;
            font-weight: bold;
            transition: all 0.2s;
        }

        .btn-close:hover {
            background-color: #ff7597;
            color: #0b0c10;
        }

        .btn-download {
            margin-top: 25px;
            background-color: #ff7597;
            color: #0b0c10;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Fredoka', sans-serif;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(255, 117, 151, 0.2);
            display: inline-block;
        }

        .btn-download:hover {
            transform: scale(1.03);
            background-color: #ff4a75;
        }

        .popup-overlay.show {
            display: flex;
            opacity: 1;
        }
        .popup-overlay.show .popup-letter {
            transform: scale(1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* STYLING TAMBAHAN UNTUK POP-UP PERINGATAN IDLE */
        .popup-warning {
            background-color: #1f2833;
            border: 4px dashed #66fcf1;
            border-radius: 20px;
            width: 85%;
            max-width: 400px;
            padding: 30px;
            box-sizing: border-box;
            text-align: center;
            box-shadow: 0 10px 25px rgba(102, 252, 241, 0.3);
            transform: scale(0.7);
            transition: transform 0.4s ease;
        }
        .popup-warning-text {
            color: #ffffff;
            font-size: 18px;
            font-family: 'Fredoka', sans-serif;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        .btn-warning-close {
            background-color: #66fcf1;
            color: #0b0c10;
            border: none;
            padding: 10px 25px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Fredoka', sans-serif;
            transition: transform 0.2s, background-color 0.2s;
        }
        .btn-warning-close:hover {
            transform: scale(1.05);
            background-color: #45a29e;
            color: #ffffff;
        }
        .popup-overlay.show .popup-warning {
            transform: scale(1);
        }
    </style>
</head>

    <script>
        // Teks Pesan Pembuka
        const daftarPesan = [
            "Special teruntuk kamu, <br>Syavira Dwi Dinanti. 💙",
            "Bee, tetap tulis aja apa yang kamu mau tulis ya untukku...",

            "Silakan klik dibawah buat masuk ke surat Specialnya ya Bee! 👇❤️"
        ];

        // EDIT ISI SURAT DISINI
        const daftarSuratMentah = {
            1: "Your First Letter...❤️\n\nIni surat pertama buat kamu. Cuma mau bilang,terimakasih kamu sudah hadir disetiap Bahagiaku, sedihku, senangku, susahku..\nAku sangat beruntung memiliki kamu disini sayang.Mungkin kalimat tidak akan cukup panjang untuk mengungkapkan rasa sayang dan terimakasih ku kekamu.\nLove You So Much Bee... 💙\n\n-pin",
            2: "Dear Manusia Kesayanganku,\n\nMungkin orang bisa bilang aku lebay, berlebihan atau semacamnya...\nCuma itu yang terjadi, aku hanya mengungkapkan apa yang sedang kurasakan saja.\nTidak mau melebihkan apalagi mengurang ngurangkannya..\nLagi senang pasti aku bilang senang, lagi sedih pasti aku akan bilang sedih. 🌸\n\n-pin",
            3: "Maaf aku aku sedang di situasi rewel, overthingking, ga mood selalu membuat kamu ga nyaman.\nTerimakasih sudah selalu ada selalu di samping aku. Kamu yang mau sabar banget hadapin aku...\n\n\n-pin",
            4: "Pengingat Kecil..✨\n\nDari orang yang selalu khawatir dengan kesehatan kamu setiap hari yaitu aku, Jangan lupa diminum airnya.. Selalu di minum vitamin C nya ya!\nJangan telat makan!aku cuma ga mau senyum manis kamu pudar karena kamu sakit.\n\n-pin",
            5: "Dear Syavira,\n\nAkulah orang yang selalu mau tau kamu kenapa, Bahagiakah? Sedihkah? Betekah? Ya, itu aku..\nSicuek itu yang kini luluh dan mulai bisa memperhatikan seseorang yang dia sayangi dan cintai. LOVE YOU BEE ! 💙\n\n-pin",
            6: "Semua Tentang Kamu 🧸\n\nAku suka kamu selalu berkabar.. Video mu dan Photo yang kamu kasih semua aku suka melihatnya..\nAku suka perhatian kamu, aku suka senyum manis yang selalu kamu lontarkan saat kita bertemu,Ya! berikan semua ke aku, aku suka semua..\nSuka semua tentang kamu, apapun itu bentuknya jika berasal dari kamu, aku suka semuanya.\nLOVE YOU BE !! 💙\n\n-pin",
            7: "Menghitung Waktu ⏳\n\nRasanya waktu berjalan lambat banget kalau kita lagi nggak satu shift. Aku di sini selalu menghitung jam, nggak sabar buat bisa dengar suara kamu langsung. Fokus kerjanya ya Bee, I miss you so damn badly! 🖤\n\n-pin",
            8: "Harapan Besarku 🌌\n\nAku berharap kita bisa terus bareng-bareng menghadapi apa pun ke depannya.\nJika Ego lagi tinggi disaat sedang sama sama tidak baik baik saja moodnya, tolong lepaskan dulu sebentar ya..\nKarena akupun juga begitu..\nBaik hari yang seru maupun hari yang berat. Jangan pernah lepasin genggaman tangan kita ya, Bee.\nSebesar apapun marahku, Sebesar apapun bete aku, Cinta dan sayang aku tidak akan pernah pudar bahkan berkurang sayang..\nBahkan selalu bertambah lagi.. lagi... dan lagi...\nI love you to the moon and back! 💙\n\n-pin",
            9: "Jujurly Bee..\n\nAku suka menatapmu lama bukan karena aku tau dirimu selalu salahtingkah saat aku menatap kamu lama.\nTapi karena karena memang aku suka menatap wanita ku yang cantik adn hebat lalu menyimpan wajah kamu disaat seperti ini, yakni kamu sedang tidak ada disampingku.\n\n-pin",
            10: "Rumah Teraman 🧸\n\nTerima kasih karena selalu punya cara untuk menenangkan badai di kepalaku. Saat aku mulai overthinking, sabarmu selalu jadi penawarnya. Maaf ya kalau aku suka rewel, itu karena aku terlalu menyayangimu.\n\n-pin",
            11: "Hi Wanitaku...🥰\n\nDari sekian banyaknya manusia di KPS ini, aku sangat bersyukur kita di pertemukan dengan cara yang tidak pernah diduga-duga.\nYang dimana aku bisa bisa nya mengajak kamu jalan berdua dengan alasan berbincang.\nLucu ya, aku bersyukur kejadian itu terjadi.\n LOVE YOU SO MUCH BEE !! ✨\n\n-pin",
            12: "Keajaiban Kecilku 🌟\n\nKamu nggak perlu jadi orang lain untuk terlihat mengagumkan. Di mataku, segala kekurangan dan kelebihanmu adalah perpaduan yang paling sempurna. Kamu adalah definisi wanita hebat yang sesungguhnya.\n\n-pin",
            13: "Masa Depan Bersamamu 🌌\n\nAku ingin melewati lebih banyak lembaran cerita baru bersamamu. Menghadapi hari baik, hari buruk, tawa, maupun tantangan ke depannya. Tetap genggam erat tanganku ya, Bee. I love you to the moon and back! 💙\n\n-pin",
            14: "Mood Boosterku.. 🥰\n\nSetiap kali hariku terasa berat atau melelahkan, mengingat senyummu saja sudah cukup buat mengembalikan energiku. Makasih ya sayang sudah menjadi alasan terbesar di balik semangat dan senyumku hari ini.\n\n-pin",

            17: "My Fear..\n\nAku takut kamu berpaling, aku takut kamu pergi, aku takut aku di duakan, aku takut kamu kecewa, aku takut perasaan mu, perhatian mu hilang ...\n Ya! itu adalah rasa takutku.. sebegitu takut karena sebesar itu sayang dan rasa kepemilikan ku atas mu bee...\n\n-pin",
            18: "PERINGATAN !! \n\nJangan lupa pap! Aku mau claim semua hadiah ku sayang...\nAku mau 10-1, 10-8 lagi.. Aku mau! Aku mau! Aku mau! Aku mau!\n\n-pin",
            19: "You're My Reason..💙\n\nMemiliki kamu itu hal yang luar biasa didalam hidup aku bee..\nMenemukanmu adalah hal yang terbaik selama aku hidup. Terimakasih sudah selalu menjadi dan berusaha yang terbaik untuk aku ya Bee.. LOVE YOU !💙\n\n-pin",
            20: "Terakhir Tapi Selamanya ✨\n\nFokus tuntasin shift-nya ya sayang, dikit lagi selesai kok! Btw, aku selalu suka tiap kali kamu ngabarin lewat pap video, itu beneran bikin tenang. Semangat terus Bee, aku tungguin kamu! 🖤🌸\n\n-pin",
        };

        // Objek kosong yang akan menampung hasil surat setelah diacak secara acak
        const daftarSurat = {};

        // Fungsi mengacak isi surat secara acak saat direfresh/dibuka
        function acakSurat() {
            const keys = Object.keys(daftarSuratMentah);
            const values = Object.values(daftarSuratMentah);
            
            // Proses pengacakan array value
            for (let i = values.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [values[i], values[j]] = [values[j], values[i]];
            }
            
            // Pasangkan kembali ke objek utama
            keys.forEach((key, index) => {
                daftarSurat[key] = values[index];
            });
        }
        
        // Jalankan pengacakan langsung saat script dimuat
        acakSurat();

        // --- PENGATURAN FOTO DI SINI ---
        const daftarFoto = {
            21: "N/A",
        };


        // --- KUSTOMISASI ISI PERINGATAN IDLE DISINI ---
        const daftarPeringatanIdle = [
            "Bee... Kenapa didiemin? <br>Jangan melamun yaa sayang, Keep fokus ya atau lanjut baca suratnya yuk! 🧸💙",
            "Bee... Hati-hati ngantuk ya! Kalau ngantuk + Senggang mending baca lagi yuk, masih ada cerita buat kamu hari ini. 🧸🌸",
            "Jangan lupa diminum airnya ya sayang, Kalau sudah senggang yuk baca lagi surat nya! 🥰🌸",
            "Dorrr! ✨<br>Kaget gak? Cuma mau billing aja, Semangat ya shiftnya! <br>Jangan lupa diminum air nya, di pakai DOC Izinnya, LOVE YOU BE!",
            "Kangen ya sampai didiamkan begini? <br>Yuk dibuka lagi surat manisnya, masih banyak cerita buat kamu hari ini. 🌌🖤"
        ];

        // Waktu tunggu dalam milidetik (Contoh: 15000 = 15 detik didiamkan baru muncul pop-up)
        const WAKTU_IDLE = 15000; 


        let indeksPesan = 0;
        let currentActiveSurat = null;
        let heartInterval = null; 
        let idleTimer = null; // Menyimpan timer deteksi diam

        function startEffects() {
            const music = document.getElementById("backsound");
            if (music.paused) {
                music.play().catch(e => console.log("Autoplay ditolak, aktif di interaksi selanjutnya."));
            }
            if (!heartInterval) {
                heartInterval = setInterval(createHeart, 1500);
            }
            // Mulai memantau aktivitas setelah interaksi pertama
            resetIdleTimer();
        }

        function createHeart() {
            const heart = document.createElement("div");
            heart.classList.add("heart-particle");
            heart.innerHTML = ["❤️", "💖", "🌸", "✨", "💙"][Math.floor(Math.random() * 5)];
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.animationDuration = Math.random() * 3 + 2 + "s";
            heart.style.fontSize = Math.random() * 15 + 15 + "px";
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 5000);
        }
        
        function nextPesan() {
            const textElement = document.getElementById("textGanti");
            startEffects(); 
            
            if (indeksPesan < daftarPesan.length) {
                textElement.style.opacity = 0;
                setTimeout(() => {
                    textElement.innerHTML = daftarPesan[indeksPesan];
                    textElement.style.opacity = 1;
                    indeksPesan++;
                }, 300);
            } else {
                document.getElementById("msgBox").style.display = "none";
                document.getElementById("galleryBox").style.display = "block";
            }
        }

        function bukaSurat(nomor) {
            currentActiveSurat = nomor;
            const overlay = document.getElementById("popupOverlay");
            const isiSurat = document.getElementById("isiSuratDetail");
            const komponenFoto = document.getElementById("fotoSuratDetail"); 
            
            isiSurat.innerText = daftarSurat[nomor];
            
            if (daftarFoto[nomor] && daftarFoto[nomor] !== "N/A") {
                komponenFoto.src = daftarFoto[nomor];
                komponenFoto.style.display = "inline-block"; 
            } else {
                komponenFoto.style.display = "none"; 
            }
            
            overlay.style.display = "flex";
            setTimeout(() => {
                overlay.classList.add("show");
            }, 10);
        }

        // Mengunduh amplop isi surat menjadi gambar PNG + Menyertakan Tanggal Real-Time
        function unduhSuratGambar() {
            const target = document.getElementById("captureArea");
            const tombolDownload = document.getElementById("btnDownload");
            const tombolTutup = document.querySelector(".btn-close");
            const elemenTanggal = document.getElementById("tanggalDownload");

            // 1. Dapatkan tanggal hari ini secara otomatis saat diklik
            const hariIni = new Date();
            const dd = String(hariIni.getDate()).padStart(2, '0');
            const mm = String(hariIni.getMonth() + 1).padStart(2, '0'); // Januari adalah 0
            const yyyy = hariIni.getFullYear();
            
            // 2. Set format teks DD/MM/YYYY ke elemen tanggal, lalu tampilkan
            elemenTanggal.innerText = dd + "/" + mm + "/" + yyyy;
            elemenTanggal.style.display = "block";

            // Sembunyikan tombol sementara agar tidak ikut kefoto
            tombolDownload.style.visibility = "hidden";
            tombolTutup.style.visibility = "hidden";

            html2canvas(target, {
                backgroundColor: "#fff0f5",
                borderRadius: 20,
                scale: 2,
                useCORS: true
            }).then(canvas => {
                // Munculkan kembali tombolnya
                tombolDownload.style.visibility = "visible";
                tombolTutup.style.visibility = "visible";
                
                // Sembunyikan kembali tanggal di halaman web
                elemenTanggal.style.display = "none";

                const link = document.createElement("a");
                link.download = "Surat_Cinta_No_" + currentActiveSurat + ".png";
                link.href = canvas.toDataURL("image/png");
                link.click();
            }).catch(err => {
                tombolDownload.style.visibility = "visible";
                tombolTutup.style.visibility = "visible";
                elemenTanggal.style.display = "none";
                alert("Fitur download otomatis ini baru akan aktif 100% setelah filenya kamu upload ke GitHub Pages ya Bee!");
            });
        }

        function tutupSurat() {
            const overlay = document.getElementById("popupOverlay");
            overlay.classList.remove("show");
            setTimeout(() => {
                overlay.style.display = "none";
            }, 400);
        }

        // --- FUNGSI BARU UNTUK SISTEM IDLE DETECTOR ---
        function resetIdleTimer() {
            // Hapus timer lama tiap ada pergerakan/interaksi baru
            clearTimeout(idleTimer);
            
            // Jangan memicu peringatan jika pop-up surat utama atau pop-up peringatan sedang terbuka
            const isPopupOpen = document.getElementById("popupOverlay").classList.contains("show");
            const isWarningOpen = document.getElementById("warningOverlay").classList.contains("show");

            if (!isPopupOpen && !isWarningOpen) {
                idleTimer = setTimeout(munculkanWarning, WAKTU_IDLE);
            }
        }

        function munculkanWarning() {
            const warningOverlay = document.getElementById("warningOverlay");
            const warningText = document.getElementById("warningText");
            
            // Mengambil satu pesan secara acak dari array daftarPeringatanIdle
            const pesanAcak = daftarPeringatanIdle[Math.floor(Math.random() * daftarPeringatanIdle.length)];
            warningText.innerHTML = pesanAcak;

            warningOverlay.style.display = "flex";
            setTimeout(() => {
                warningOverlay.classList.add("show");
            }, 10);
        }

        function tutupWarning() {
            const warningOverlay = document.getElementById("warningOverlay");
            warningOverlay.classList.remove("show");
            setTimeout(() => {
                warningOverlay.style.display = "none";
                resetIdleTimer(); // Mulai hitung ulang waktu diam dari nol kembali
            }, 400);
        }

        // Mendeteksi klik atau sentuhan jari di layar untuk mereset timer diam
        window.onclick = resetIdleTimer;
        window.ontouchstart = resetIdleTimer;
    </script>
</body>
</html>
