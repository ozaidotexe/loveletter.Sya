<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surat Spesial Buat Kamu ✨</title>
    <style>
        /* Menggunakan font cute dari Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Quicksand:wght@500;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #0b0c10; /* Sentuhan Hitam Utama */
            font-family: 'Quicksand', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(#1f2833 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* Container Utama */
        .container {
            text-align: center;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* KOTAK PESAN PEMBUKA (STEP BY STEP) */
        .message-box {
            background-color: rgba(31, 40, 51, 0.9);
            border: 4px solid #ff7597; /* Border Pink Cute */
            border-radius: 20px;
            padding: 30px;
            max-width: 450px;
            box-shadow: 0 8px 20px rgba(255, 117, 151, 0.3);
            transition: all 0.5s ease;
        }

        .message-text {
            color: #66fcf1; /* Warna Biru Neon/Pastel */
            font-size: 22px;
            font-family: 'Fredoka', sans-serif;
            margin-bottom: 25px;
            line-height: 1.5;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Tombol Next */
        .btn-next {
            background-color: #ff7597; /* Pink */
            color: #0b0c10; /* Hitam */
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Fredoka', sans-serif;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 4px 10px rgba(255, 117, 151, 0.4);
        }

        .btn-next:hover {
            transform: scale(1.05);
            background-color: #ff4a75;
        }

        /* ========================================= */
        /* ANIMASI AMPLOP & SURAT TERLIPAT (TERSEMBUNYI DI AWAL) */
        /* ========================================= */
        .envelope-wrapper {
            display: none;
            cursor: pointer;
            position: relative;
            animation: fadeIn 1s ease forwards;
        }

        .envelope {
            position: relative;
            width: 280px;
            height: 180px;
            background-color: #45a29e; /* Warna Biru Tua/Toska */
            border-radius: 0 0 10px 10px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }

        /* Penutup Amplop Atas (Segitiga Lipat) */
        .envelope::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 140px solid transparent;
            border-right: 140px solid transparent;
            border-top: 100px solid #52b2ae; /* Sedikit lebih terang */
            transform-origin: top;
            transition: transform 0.4s ease 0.4s;
            z-index: 4;
        }

        /* Bagian Dalam/Samping Amplop */
        .envelope::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 140px solid #398c89;
            border-right: 140px solid #398c89;
            border-top: 90px solid transparent;
            border-bottom: 90px solid #398c89;
            border-radius: 0 0 10px 10px;
            z-index: 3;
        }

        /* Kertas Surat di Dalam Amplop */
        .letter {
            position: absolute;
            bottom: 10px;
            left: 20px;
            width: 240px;
            height: 150px;
            background-color: #fff0f5; /* Pink sangat muda / putih pinkish */
            border: 3px solid #ff7597; /* Border Pink */
            border-radius: 8px;
            z-index: 2;
            transition: all 0.6s ease;
            padding: 15px;
            box-sizing: border-box;
            overflow: hidden;
        }

        .letter-text {
            font-size: 14px;
            color: #0b0c10; /* Tulisan Hitam */
            line-height: 1.4;
            text-align: center;
            font-weight: 600;
        }

        /* Stiker Hati di Tengah Amplop */
        .heart-seal {
            position: absolute;
            top: 80px;
            left: 125px;
            width: 30px;
            height: 30px;
            background-color: #ff7597;
            transform: rotate(-45deg);
            z-index: 5;
            transition: transform 0.4s ease 0.4s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .heart-seal::before, .heart-seal::after {
            content: "";
            position: absolute;
            width: 30px;
            height: 30px;
            background-color: #ff7597;
            border-radius: 50%;
        }
        .heart-seal::before { top: -15px; left: 0; }
        .heart-seal::after { left: 15px; top: 0; }

        /* KETIKA AMPLOP DIKLIK (EFEK TERBUKA) */
        .envelope-wrapper.open .envelope::before {
            transform: rotateX(180deg);
            z-index: 1;
        }

        .envelope-wrapper.open .letter {
            bottom: 100px;
            height: 260px;
            z-index: 4;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.3);
        }

        .envelope-wrapper.open .heart-seal {
            transform: translateY(60px) rotate(-45deg) scale(0);
        }

        /* Teks Petunjuk Kecil */
        .hint-text {
            color: #ff7597;
            margin-top: 20px;
            font-size: 14px;
            font-weight: bold;
            animation: bounce 1s infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-5px); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="message-box" id="msgBox">
            <div class="message-text" id="textGanti">Klik tombol di bawah yaa...</div>
            <button class="btn-next" onclick="nextPesan()" id="btnNext">Next ➡️</button>
        </div>

        <div class="envelope-wrapper" id="envelopeBox" onclick="bukaSurat()">
            <div class="envelope">
                <div class="letter">
                    <div class="letter-text" id="isiSuratUtama">
                        </div>
                </div>
                <div class="heart-seal"></div>
            </div>
            <div class="hint-text">Klik amplopnya untuk membuka ✨</div>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. EDIT TEKS PESAN PEMBUKA DI SINI
        // ==========================================
        // Kamu bisa menambah atau mengurangi kalimat di dalam tanda kurung kotak [ ]
        const daftarPesan = [
            "Hai kamu... Akhirnya dibuka juga link-nya 💙",
            "Aku sengaja bikin halaman web ini khusus buat kamu.",
            "Tahu kan kenapa warnanya hitam, biru, sama pink? Hehe.",
            "Ada satu hal penting yang mau aku sampein ke kamu...",
            "Coba klik tombol Next sekali lagi buat liat suratnya! 👇"
        ];

        // ==========================================
        // 2. EDIT TEKS ISI SURAT UTAMA DI SINI
        // ==========================================
        // Gunakan <br> jika ingin membuat baris baru/pindah alinea
        const isiSuratMutiara = "Halo Sayang! <br><br> Makasih ya udah selalu ada buat aku, udah sabar menghadapi aku, dan selalu jadi orang yang paling bikin aku semangat.<br><br>Aku beruntung banget punya kamu di hidupku. I love you so much! 🖤🌸";


        // --- JANGAN EDIT SCRIPT DI BAWAH INI KECUALI KAMU PAHAM ---
        let indeksPesan = 0;
        
        function nextPesan() {
            const textElement = document.getElementById("textGanti");
            
            if (indeksPesan < daftarPesan.length) {
                textElement.style.opacity = 0;
                setTimeout(() => {
                    textElement.innerHTML = daftarPesan[indeksPesan];
                    textElement.style.opacity = 1;
                    indeksPesan++;
                }, 300);
            } else {
                // Jika pesan pembuka habis, sembunyikan kotak pesan dan munculkan surat
                document.getElementById("msgBox").style.display = "none";
                
                // Set isi surat utama sebelum ditampilkan
                document.getElementById("isiSuratUtama").innerHTML = isiSuratMutiara;
                
                // Tampilkan amplop
                document.getElementById("envelopeBox").style.display = "block";
            }
        }

        function bukaSurat() {
            const envelope = document.getElementById("envelopeBox");
            envelope.classList.toggle("open");
        }
    </script>
</body>
</html>
